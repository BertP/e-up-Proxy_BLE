[platformio]
default_envs = esp32c6-usb

; ESP32-C6 USB Fallback — serial flash via /dev/ttyACM0
[env:esp32c6-usb]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_single.csv
build_flags = -D MQTT_MAX_PACKET_SIZE=1024 -D HARDWARE_PLATFORM='"esp32c6-usb"' -D LED_PIN=15 -D LED_ACTIVE_HIGH=0 -D IS_ESP32_C6=1 -D ARDUINO_USB_MODE=1 -D ARDUINO_USB_CDC_ON_BOOT=1
upload_protocol = esptool
upload_port = /dev/ttyACM0
upload_speed = 460800
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.4
    h2zero/NimBLE-Arduino @ ^2.5.0

; Native testing environment on development host PC
[env:native]
platform = native
test_framework = unity
build_flags = -DNATIVE_TEST -std=gnu++17 -Itest/mocks
test_build_src = yes
build_src_filter = +<*> -<main.cpp> -<NetworkManager.cpp> -<DiagnosticsServer.cpp>
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4

